name: PM2.5 Forecast

on:
  # Triggered externally by cronjob.org (POSTing to the GitHub API dispatch
  # trigger every 3 hours from cronjob
  workflow_dispatch: {}

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements-forecast.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-forecast.txt

      - name: Run forecast script
        env:
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}
        run: python scripts/run_forecast.py
